<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cerebrum | Premium Scientific Intelligence Workspace</title>
  
  <style>
    /* --- Cerebrum Premium Organic Workspace Layout Rules --- */
    :root {
      --bg-primary: #fcfbfa;       /* Warm linen white */
      --bg-sidebar: #f5f2ed;      /* Soft warm concrete tone */
      --bg-card: #ffffff;
      --text-main: #2d312e;       /* Organic deep grey charcoal */
      --text-muted: #626864;
      --accent-green: #4a5d4e;    /* Matte sage green signature */
      --accent-orange: #d97741;   /* Warm organic clay */
      --border-subtle: #e6e4e0;
      --shadow-sm: 0 2px 8px rgba(45, 49, 46, 0.03);
      --shadow-md: 0 10px 30px rgba(45, 49, 46, 0.05);
      --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      font-family: var(--font-stack);
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* --- Auth Gateway Presentation Styling --- */
    .auth-card-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100vw;
      background: var(--bg-primary);
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
    }

    /* --- Split-Screen Dashboard Structure --- */
    .dashboard-layout {
      display: flex;
      width: 100vw;
      min-height: 100vh;
      overflow: hidden;
    }

    /* --- Workspace Sidebar Style Grid --- */
    .sidebar-container {
      width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.3s ease, width 0.3s ease;
      z-index: 10;
    }

    .sidebar-container.closed {
      width: 0px;
      transform: translateX(-260px);
      position: absolute;
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .premium-logo-mark {
      background: var(--accent-green);
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: -0.05em;
    }

    .brand-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-header h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-main);
      margin: 0;
    }

    .sidebar-scroll-grid {
      flex-grow: 1;
      padding: 20px 14px;
      overflow-y: auto;
    }

    .sidebar-section-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 700;
      padding-left: 10px;
    }

    .sidebar-chat-link {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 8px;
      color: var(--text-main);
      text-align: left;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
      margin-bottom: 4px;
    }

    .sidebar-chat-link:hover {
      background: rgba(74, 93, 78, 0.06);
    }

    .sidebar-link-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    .empty-sidebar-notice {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding-left: 10px;
      font-style: italic;
    }

    .sidebar-footer {
      padding: 20px 16px;
      border-top: 1px solid var(--border-subtle);
      background: rgba(255,255,255,0.3);
    }

    /* --- User Profile & Token Plate --- */
    .user-profile-plate {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .profile-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent-green);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    .profile-info {
      display: flex;
      flex-direction: column;
    }

    .profile-name {
      font-size: 0.88rem;
      font-weight: 600;
    }

    .profile-status {
      font-size: 0.72rem;
      color: var(--accent-orange);
      font-weight: 500;
    }

    .utility-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      font-weight: 500;
      background: var(--bg-card);
      transition: background 0.2s;
    }

    .utility-btn:hover {
      background: #faf8f5;
    }

    /* --- Primary Main Content Area Layout --- */
    .main-content-area {
      flex-grow: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .sidebar-toggle-trigger {
      position: absolute;
      top: 20px;
      left: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      padding: 8px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      color: var(--text-muted);
      transition: background 0.2s;
    }

    .sidebar-toggle-trigger:hover {
      background: #faf8f5;
      color: var(--text-main);
    }

    .app-container {
      width: 100%;
      max-width: 800px;
      padding: 80px 20px 40px 20px;
      box-sizing: border-box;
    }

    /* --- Input Elements & Global Animation Grids --- */
    .search-wrapper {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      box-shadow: var(--shadow-md);
      transition: border 0.3s, box-shadow 0.3s;
    }

    .search-wrapper:focus-within {
      border-color: var(--accent-green);
      box-shadow: 0 16px 40px rgba(74, 93, 78, 0.08);
    }

    .search-input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 1.05rem;
      padding: 12px 8px;
      color: var(--text-main);
      background: transparent;
    }

    .search-button {
      background: var(--accent-green);
      color: white;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .search-button:hover {
      transform: scale(1.05);
    }

    .answer-box {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 36px;
      box-shadow: var(--shadow-sm);
      margin-top: 30px;
      line-height: 1.7;
      font-size: 1.02rem;
      white-space: pre-wrap;
      animation: riseReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .answer-box h3 {
      font-size: 1.22rem;
      margin-top: 28px;
      margin-bottom: 12px;
      color: var(--text-main);
    }

    .answer-box h3:first-child { margin-top: 0; }

    .answer-box blockquote {
      border-left: 3px solid var(--accent-orange);
      padding: 12px 20px;
      background: #faf9f6;
      margin: 20px 0;
      border-radius: 0 8px 8px 0;
      color: var(--text-muted);
    }

    /* --- Shimmer Loader Lines --- */
    .loading-shimmer {
      height: 14px;
      background: linear-gradient(90deg, #f5f2ed 25%, #eae6de 50%, #f5f2ed 75%);
      background-size: 200% 100%;
      animation: shimmerMove 1.5s infinite linear;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .sources-section {
      border-top: 1px solid var(--border-subtle);
      padding-top: 30px;
      margin-top: 30px;
      width: 100%;
    }

    .sources-header {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    .source-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 18px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }

    .source-card:hover {
      border-color: var(--accent-green);
      transform: translateY(-2px);
    }

    .source-title {
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .source-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .citation-tag {
      background: #eed;
      color: var(--accent-green);
      padding: 2px 6px;
      font-size: 0.72rem;
      font-weight: 700;
      border-radius: 4px;
    }

    /* --- Legal Footprint Nodes --- */
    .system-legal-disclaimer {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.5;
      text-align: center;
      margin-top: 60px;
      border-top: 1px dashed var(--border-subtle);
      padding-top: 16px;
    }

    @keyframes riseReveal {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmerMove {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
